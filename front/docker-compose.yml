services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy_react
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./dist:/var/www
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web-network

  react-app:
    build: .
    container_name: react_front
    restart: unless-stopped
    networks:
      - web-network

networks:
  web-network:
    external: true
volumes:
  caddy_data:
  caddy_config:
