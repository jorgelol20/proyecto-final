services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "5173:5173"
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./src:/var/www
      - ./../front/dist:/srv/frontend:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      php:
        condition: service_started
      db:
        condition: service_started
    networks:
      web-network:
        aliases:
          - caddy
  php:
    build: ./php
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    depends_on:
      db:
        condition: service_started
    networks:
      web-network:
        aliases:
          - php
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: scoundrel
      MYSQL_USER: master
      MYSQL_PASSWORD: ofpuppets
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - web-network

networks:
  web-network:
    name: web-network
    driver: bridge
    external: true

volumes:
  db_data:
  caddy_config:
  caddy_data: